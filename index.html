
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B13-A5-Github-Issue-Tracker</title>
      <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; -webkit-font-smoothing: antialiased; }
        
        .tab-btn { color: #64748B; font-weight: 700; font-size: 15px; padding: 10px 32px; border-radius: 8px; cursor: pointer; border: 1px solid #E2E8F0; background: white; transition: 0.3s; }
        .tab-btn.active { background-color: #4F12F9 !important; color: white !important; border-color: #4F12F9 !important; }

    </style>
</head>
<body>
     <div id="login-page" class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-[440px] w-full bg-white p-14 rounded-[48px] shadow-sm border border-gray-100 text-center">
            <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="GitHub Logo" class="w-16 h-16 mx-auto mb-6">
            <h2 class="text-3xl font-black mb-2 text-slate-900">Sign In</h2>
            <p class="text-slate-400 font-bold mb-10 italic text-sm">Demo: admin / admin123</p>
            <form id="login-form" class="space-y-6 text-left">
                <input type="text" id="user-input" value="admin" class="w-full h-14 bg-gray-50 rounded-2xl border border-gray-100 px-6 font-bold" required>
                <input type="password" id="pass-input" value="admin123" class="w-full h-14 bg-gray-50 rounded-2xl border border-gray-100 px-6 font-bold" required>
                <button type="submit" class="w-full h-15 bg-black text-white rounded-2xl font-black text-lg py-4">Sign In</button>
            </form>
        </div>
    </div>

      <div id="dashboard-page" class="hidden min-h-screen">
        <header class="bg-white border-b border-gray-100 px-10 py-6 sticky top-0 z-50 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="Logo" class="w-10 h-10">
                <span class="text-2xl font-black tracking-tighter text-slate-800">GitHub Issues</span>
            </div>
            <div class="flex items-center gap-6">
                <input type="text" id="search-bar" placeholder="Search issues..." class="w-80 h-12 bg-gray-50 px-6 rounded-2xl border border-gray-100 text-sm font-bold">
                <button onclick="document.getElementById('new_issue_modal').showModal()" class="bg-[#4F12F9] text-white px-6 h-12 rounded-xl font-black">+ New Issue</button>
            </div>
        </header>

        <main class="p-10 max-w-[1440px] mx-auto w-full">
            <div class="bg-white p-8 rounded-[24px] border border-gray-100 mb-8">
                <div class="flex items-center gap-3 mb-10">
                    <div id="btn-all" onclick="filterCards('all')" class="tab-btn active">All</div>
                    <div id="btn-open" onclick="filterCards('open')" class="tab-btn">Open</div>
                    <div id="btn-closed" onclick="filterCards('closed')" class="tab-btn">Closed</div>
                </div>
                <div class="flex items-center gap-5">
                    <div class="w-14 h-14 bg-[#F1E9FF] rounded-xl flex items-center justify-center">
                        <img src="https://cdn-icons-png.flaticon.com/512/595/595067.png" class="w-7 h-7" alt="icon">
                    </div>
                    <div>
                        <h2 class="text-3xl font-black text-slate-900" id="count-display">0 Issues</h2>
                        <p class="text-slate-400 font-bold">Manage your project tracking</p>
                    </div>
                </div>
            </div>

             <div id="grid-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </main>
    </div>

       <script>
        let allIssues = [];
        let currentTab = 'all';

        //API Integration
        async function fetchIssues() {
            try {
                const res = await fetch('https://phi-lab-server.vercel.app/api/v1/lab/issues');
                const result = await res.json();
                if(result.data) { 
                    allIssues = result.data; 
                    applyFilters(); 
                }
            } catch (err) { console.error("Fetch Error:", err); }
        }

         </script>
       
</body>
</html>
