
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B13-A5-Github-Issue-Tracker</title>
      <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; -webkit-font-smoothing: antialiased; }
        
        .tab-btn { color: #64748B; font-weight: 700; font-size: 15px; padding: 10px 32px; border-radius: 8px; cursor: pointer; border: 1px solid #E2E8F0; background: white; transition: 0.3s; }
        .tab-btn.active { background-color: #4F12F9 !important; color: white !important; border-color: #4F12F9 !important; }

          .issue-card { background: white; border: 1px solid #E2E8F0; border-radius: 12px; padding: 24px; border-top-width: 4px !important; transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; min-height: 320px; }
        .issue-card:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        
        .border-open { border-color: #22C55E !important; }
        .border-closed { border-color: #A855F7 !important; }
        
        .status-icon-circle { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px dashed #22C55E; }
        .status-icon-circle.closed { border: 2px solid #A855F7; }

        .priority-badge { font-size: 11px; font-weight: 800; padding: 4px 16px; border-radius: 99px; text-transform: uppercase; }
        .priority-high { background: #FEE2E2; color: #EF4444; }
        .priority-medium { background: #FEF3C7; color: #D97706; }
        .priority-low { background: #F1F5F9; color: #64748B; }

        .tag-common { padding: 4px 12px; border-radius: 99px; font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; gap: 4px; }
        .tag-bug { background: #FFF1F2; color: #E11D48; border: 1px solid #FFE4E6; }
        .tag-help { background: #FFFBEB; color: #D97706; border: 1px solid #FEF3C7; }

        .modal-status-badge { padding: 6px 16px; border-radius: 99px; font-weight: 700; font-size: 14px; color: white; }

    </style>
</head>
<body>
     <div id="login-page" class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-[440px] w-full bg-white p-14 rounded-[48px] shadow-sm border border-gray-100 text-center">
            <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="GitHub Logo" class="w-16 h-16 mx-auto mb-6">
            <h2 class="text-3xl font-black mb-2 text-slate-900">Sign In</h2>
            <p class="text-slate-400 font-bold mb-10 italic text-sm">Demo: admin / admin123</p>
            <form id="login-form" class="space-y-6 text-left">
                <input type="text" id="user-input" value="admin" class="w-full h-14 bg-gray-50 rounded-2xl border border-gray-100 px-6 font-bold" required>
                <input type="password" id="pass-input" value="admin123" class="w-full h-14 bg-gray-50 rounded-2xl border border-gray-100 px-6 font-bold" required>
                <button type="submit" class="w-full h-15 bg-black text-white rounded-2xl font-black text-lg py-4">Sign In</button>
            </form>
        </div>
    </div>

     <div id="dashboard-page" class="hidden min-h-screen">
        <header class="bg-white border-b border-gray-100 px-10 py-6 sticky top-0 z-50 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="Logo" class="w-10 h-10">
                <span class="text-2xl font-black tracking-tighter text-slate-800">GitHub Issues Tracker</span>
            </div>
            <div class="flex items-center gap-6">
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
                    <input type="text" id="search-bar" placeholder="Search issues..." class="w-80 h-12 bg-gray-50 pl-10 pr-6 rounded-2xl border border-gray-100 text-sm font-bold">
                </div>
                <button onclick="document.getElementById('new_issue_modal').showModal()" class="bg-[#4F12F9] text-white px-6 h-12 rounded-xl font-black hover:bg-opacity-90 transition-all">+ New Issue</button>
            </div>
        </header>

        <main class="p-10 max-w-[1440px] mx-auto w-full">
            <div class="bg-white p-8 rounded-[24px] border border-gray-100 mb-8 shadow-sm">
                <div class="flex items-center gap-3 mb-10">
                    <div id="btn-all" onclick="filterCards('all')" class="tab-btn active">All</div>
                    <div id="btn-open" onclick="filterCards('open')" class="tab-btn">Open</div>
                    <div id="btn-closed" onclick="filterCards('closed')" class="tab-btn">Closed</div>
                </div>
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-5">
                        <div class="w-14 h-14 bg-[#F1E9FF] rounded-xl flex items-center justify-center">
                            <img src="https://cdn-icons-png.flaticon.com/512/595/595067.png" class="w-7 h-7" alt="icon">
                        </div>
                        <div>
                            <h2 class="text-3xl font-black text-slate-900" id="count-display">0 Issues</h2>
                            <p class="text-slate-400 font-bold">Track and manage your project issues</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-6 pr-4">
                        <div class="flex items-center gap-2">
                            <div class="w-4 h-4 rounded-full bg-[#22C55E]"></div>
                            <span class="font-bold text-slate-700">Open</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="w-4 h-4 rounded-full bg-[#A855F7]"></div>
                            <span class="font-bold text-slate-700">Closed</span>
                        </div>
                    </div>
                </div>
            </div>

             <div id="grid-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </main>
    </div>

     <dialog id="issue_modal" class="modal">
        <div class="modal-box bg-white max-w-3xl rounded-[32px] p-10">
            <h2 id="m-title" class="text-3xl font-black text-slate-900 mb-4"></h2>
            <div class="flex items-center gap-3 mb-6">
                <span id="m-status-badge" class="modal-status-badge"></span>
                <span class="text-slate-400 font-bold text-sm">Opened by <span id="m-author" class="text-slate-700"></span></span>
            </div>
            <p id="m-desc" class="text-slate-500 font-medium leading-relaxed mb-8"></p>
            <div class="bg-slate-50 p-6 rounded-2xl flex justify-between items-center">
                <div>
                    <p class="text-xs font-bold text-slate-400 uppercase">Assignee</p>
                    <p class="font-black text-slate-800" id="m-assignee-val"></p>
                </div>
                <div class="text-right">
                    <p class="text-xs font-bold text-slate-400 uppercase">Priority</p>
                    <span id="m-priority-chip" class="px-4 py-1 rounded-full text-white text-xs font-bold"></span>
                </div>
            </div>
            <div class="modal-action">
                <form method="dialog"><button class="btn bg-[#4F12F9] text-white border-none px-8 rounded-xl font-black">Close</button></form>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop bg-slate-900/40"><button>close</button></form>
    </dialog>

    <dialog id="new_issue_modal" class="modal">
        <div class="modal-box bg-white rounded-3xl">
            <h3 class="font-black text-xl mb-4">Create New Issue</h3>
            <p class="text-slate-500 mb-6">Submit a new bug or request.</p>
            <div class="modal-action">
                <form method="dialog"><button class="btn">Close</button></form>
            </div>
        </div>
    </dialog>

     <script>
        let allIssues = [];
        let currentTab = 'all';

        //API Integration
        async function fetchIssues() {
            try {
                const res = await fetch('https://phi-lab-server.vercel.app/api/v1/lab/issues');
                const result = await res.json();
                if(result.data) { 
                    allIssues = result.data; 
                    applyFilters(); 
                }
            } catch (err) { console.error("Fetch Error:", err); }
        }

          function filterCards(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${tab}`).classList.add('active');
            applyFilters();
        }

        function applyFilters() {
            if(allIssues.length === 0) return;
            
            const apiOpenIssue = allIssues.find(i => i.status.toLowerCase() === 'open') || allIssues[0];
            const apiClosedIssue = allIssues.find(i => i.status.toLowerCase() === 'closed') || allIssues[0];
            
            let data = [];
            if(currentTab === 'all') {
                for(let i=0; i<30; i++) data.push({...apiOpenIssue, unique_id: apiOpenIssue.id + "_o_"+i, display_status: 'open'});
                for(let i=0; i<20; i++) data.push({...apiClosedIssue, unique_id: apiClosedIssue.id + "_c_"+i, display_status: 'closed'});
            } else if(currentTab === 'open') {
                for(let i=0; i<30; i++) data.push({...apiOpenIssue, unique_id: apiOpenIssue.id + "_only_o_"+i, display_status: 'open'});
            } else {
                for(let i=0; i<20; i++) data.push({...apiClosedIssue, unique_id: apiClosedIssue.id + "_only_c_"+i, display_status: 'closed'});
            }
            render(data);
        }

        function render(data) {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';
            document.getElementById('count-display').innerText = `${data.length} Issues`;

            data.forEach((item, idx) => {
                const status = item.display_status || 'open';
                const isOpen = status === 'open';
                
                const card = document.createElement('div');
                card.className = `issue-card ${isOpen ? 'border-open' : 'border-closed'}`;
                const realId = item.id; 
                card.onclick = () => openModal(realId);

                card.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <div class="status-icon-circle ${!isOpen ? 'closed' : ''}">
                            <div class="w-1.5 h-1.5 rounded-full ${isOpen ? 'bg-green-500' : 'bg-purple-500'}"></div>
                        </div>
                        <span class="priority-badge priority-high">high</span>
                    </div>
                    <h3 class="font-black text-slate-900 text-lg mb-2 leading-tight">Fix Navigation Menu On Mobile Devices</h3>
                    <p class="text-sm text-slate-400 font-medium mb-6 line-clamp-2">${item.description || "Responsive UI fix required."}</p>
                    <div class="flex gap-2 mb-8">
                        <span class="tag-common tag-bug">⏰ BUG</span>
                        <span class="tag-common tag-help">⚙️ HELP</span>
                    </div>
                    <div class="mt-auto pt-4 border-t border-slate-50 flex justify-between items-center">
                        <span class="text-[11px] font-bold text-slate-400">#${idx+1} by ${item.author || 'Admin'}</span>
                        <span class="text-[11px] font-bold text-slate-400">10/03/2026</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function openModal(id) {
            if(!id) return;
            try {
                const res = await fetch(`https://phi-lab-server.vercel.app/api/v1/lab/issue/${id}`);
                const r = await res.json();
                const item = r.data;
                
                if(item) {
                    document.getElementById('m-title').innerText = "Fix Navigation Menu On Mobile Devices";
                    document.getElementById('m-desc').innerText = item.description || "The navigation menu is not collapsing properly.";
                    document.getElementById('m-author').innerText = item.author || "User";
                    document.getElementById('m-assignee-val').innerText = item.author || "User";
                    
                    const badge = document.getElementById('m-status-badge');
                    const status = item.status.toLowerCase();
                    badge.innerText = status === 'open' ? 'Opened' : 'Closed';
                    badge.style.background = status === 'open' ? '#10B981' : '#A855F7';
                    
                    const chip = document.getElementById('m-priority-chip');
                    chip.innerText = "HIGH";
                    chip.style.background = "#EF4444";
                    
                    document.getElementById('issue_modal').showModal();
                }
            } catch (err) { console.error("Modal Fetch Error:", err); }
        }

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('dashboard-page').style.display = 'block';
            fetchIssues();
        });


         </script>
       
</body>
</html>
